// 1. REGISTER FINGERPRINT
async function registerFingerprint() {
    const pin = prompt("फिंगरप्रिंट रजिस्टर करने के लिए अपना PIN दर्ज करें:");
    if (pin !== localStorage.getItem("app_pin")) {
        alert("गलत PIN!");
        return;
    }

    if (!window.PublicKeyCredential) {
        alert("आपका डिवाइस बायोमेट्रिक्स का समर्थन नहीं करता है।");
        return;
    }

    try {
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);

        const userID = new Uint8Array(16);
        window.crypto.getRandomValues(userID);

        const createCredentialOptions = {
            publicKey: {
                challenge: challenge,
                rp: { name: "Mandi App Pro", id: window.location.hostname },
                user: {
                    id: userID,
                    name: "user@mandi.app",
                    displayName: "Mandi User"
                },
                pubKeyCredParams: [{ alg: -7, type: "public-key" }, { alg: -257, type: "public-key" }],
                authenticatorSelection: {
                    authenticatorAttachment: "platform",
                    userVerification: "required"
                },
                timeout: 60000
            }
        };

        const credential = await navigator.credentials.create(createCredentialOptions);
        
        // Convert ID to String for LocalStorage
        const idString = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
        localStorage.setItem("fingerprintCredential", idString);
        
        alert("फिंगरप्रिंट रजिस्टर हो गया! ✅");
        refreshBiometricUI();
    } catch (err) {
        console.error(err);
        alert("रजिस्ट्रेशन विफल: " + err.message);
    }
}

// 2. UNLOCK WITH FINGERPRINT
async function authenticateFingerprint() {
    const idString = localStorage.getItem("fingerprintCredential");
    if (!idString) return;

    try {
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);

        const rawId = Uint8Array.from(atob(idString), c => c.charCodeAt(0));

        const getCredentialOptions = {
            publicKey: {
                challenge: challenge,
                allowCredentials: [{
                    id: rawId,
                    type: 'public-key',
                    transports: ['internal']
                }],
                userVerification: "required",
                timeout: 60000
            }
        };

        const assertion = await navigator.credentials.get(getCredentialOptions);
        if (assertion) {
            unlockApp();
        }
    } catch (err) {
        console.error(err);
        alert("प्रमाणीकरण विफल या रद्द किया गया।");
    }
}

function autoCalc(){
  const b = Number(document.getElementById("bore").value || 0);
  const e = Number(document.getElementById("extra").value || 0);
  document.getElementById("quintal").value = ((b * currentDefaultBW + e) / 100).toFixed(3);
  calcAmount();
}

function calcAmount(){
  const rate = Number(document.getElementById("rate").value || 0);
  const b = Number(document.getElementById("bore").value || 0);
  const qtl = Number(document.getElementById("quintal").value || 0);
  const exDed = Number(document.getElementById("extraDeduction").value || 0);
  const commMode = document.getElementById("commMode").value;
  const commInput = Number(document.getElementById("commissionPercent").value || 0);
  
  let cut = 0;
  if(document.getElementById("cutBag").checked) cut += b * Number(document.getElementById("cutBagVal").value || 0);
  if(document.getElementById("cutQtl").checked) cut += qtl * Number(document.getElementById("cutQtlVal").value || 0);
  const gross = rate * qtl;
  let commission = 0;
  if(commMode === "percent") { commission = (gross * commInput) / 100; } else { commission = qtl * commInput; }
  const net = gross - cut - exDed - commission;
  document.getElementById("cutTotal").value = cut.toFixed(2);
  document.getElementById("cutTotalText").innerText = cut.toFixed(2);
  document.getElementById("commission").value = commission.toFixed(2);
  document.getElementById("commissionText").innerText = commission.toFixed(2);
  document.getElementById("amount").value = net.toFixed(2);
  document.getElementById("finalAmountText").innerText = "₹ " + net.toFixed(2);
}

 };

  const output = document.getElementById("output");
  output.innerHTML = ""; 
  let totalB = 0, totalKg = 0, totalC = 0;  
  arr.forEach(r => {  
    totalB += Number(r.bore || 0);  
    const qKg = Number(r.quintal || 0) * 100;
    totalKg += qKg;
    totalC += Number(r.commission || 0);
    const qtlPart = Math.floor(qKg / 100);
    const kgPart = Math.round(qKg % 100);
    output.innerHTML += `
    <tr>
      <td><input type="checkbox" class="print-row-check"></td>
      <td>${r.date || ""}</td>
      <td style="cursor:pointer; color:var(--primary); font-weight:bold;" onclick="singleClickPrint('${r.id}')" ondblclick="doubleClickEdit('${r.id}')">${r.customer || ""}</td>
      <td>${r.father || ""}</td>
      <td>${r.village || ""}</td>
      <td>${r.bore || ""}</td>
      <td>${r.extra || 0}</td>
      <td><small>${r.note || ""}</small></td>
      <td style="color:var(--success); font-weight:bold;">${qtlPart} Qtl ${kgPart} Kg</td>
      <td>
        <div style="font-size:12px;">
            Rate: ₹${r.rate || 0}<br>
            Labour: ₹${r.cut || 0}<br>
            Net: <b style="color:var(--danger)">₹${r.amount || 0}</b>
        </div>
      </td>
      <td>
        <button class="actionBtn" onclick="editEntry('${r.id}')">✏</button>
        <button class="actionBtn" style="background:var(--danger)" onclick="deleteEntry('${r.id}')">🗑</button>
      </td>
    </tr>`;
  });  
  document.getElementById("totalBore").innerText = totalB; 
  document.getElementById("totalComm").innerText = totalC.toFixed(2);
  document.getElementById("totalQtl").innerText = Math.floor(totalKg/100) + " Qtl " + Math.round(totalKg%100) + " Kg";
}
  
function sortNewest(){ sortMode = "newest"; filterData(); }
function sortOldest(){ sortMode = "oldest"; filterData(); }
  
function editEntry(id){  
  editID = id; const sName = document.getElementById("season").value;
  db.ref("seasons/"+sName+"/entries/"+id).once("value", s => {  
    const d = s.val(); editOldTimestamp = d.timestamp;
    ["customer","father","village","bore","extra","quintal","entryDate","note","extraDeduction", "commissionPercent"].forEach(f=>document.getElementById(f).value=d[f] || "");
    if(d.commMode) document.getElementById("commMode").value = d.commMode;
    document.getElementById("rate").value = d.rate || "";
    document.getElementById("entryScreen").style.display = "block";
    loadSuggestions();
    db.ref("seasonsInfo/"+sName).once("value", info => { 
      currentDefaultBW = Number(info.val().defaultBw || 0);
      document.getElementById("defaultBWView").value = currentDefaultBW;
      calcAmount(); 
    });
  });  
}  
  
function loadSeasons(){  
 const sD = document.getElementById("season"); sD.innerHTML="";  
 db.ref("seasonsInfo").once("value",s=>{  
  Object.keys(s.val()||{}).forEach(n=>{ sD.innerHTML+=`<option value="${n}">${n}</option>`; });  
  sD.value=localStorage.lastSeason||sD.options[0]?.value; loadSeason();  
 });  
}  

function onSeasonChange(){ localStorage.lastSeason = document.getElementById("season").value; loadSeason(); loadSuggestions(); }
function newSeason(){ document.getElementById("seasonName").value = ""; document.getElementById("seasonWeight").value = ""; document.getElementById("seasonScreen").style.display = "block"; }
function openSeasonScreen(){ const s = document.getElementById("season").value; if(!s) return; document.getElementById("seasonScreen").style.display = "block"; db.ref("seasonsInfo/" + s).once("value", snap => { const d = snap.val() || {}; document.getElementById("seasonName").value = d.name || s; document.getElementById("seasonWeight").value = d.defaultBw || ""; }); }
function saveSeason(){ const newN = document.getElementById("seasonName").value.trim(); const w = document.getElementById("seasonWeight").value; if(!newN || !w) return; db.ref("seasonsInfo/" + newN).set({ name:newN, defaultBw:w }).then(()=>{ localStorage.lastSeason = newN; document.getElementById("seasonScreen").style.display = "none"; loadSeasons(); }); }
function deleteSeason(){ const s = document.getElementById("seasonName").value.trim(); if(s && confirm("Season delete?")){ db.ref("seasonsInfo/"+s).remove(); db.ref("seasons/"+s).remove(); localStorage.removeItem("lastSeason"); document.getElementById("seasonScreen").style.display="none"; setTimeout(loadSeasons, 500); } }

function filterData(){  
  const name = document.getElementById("searchName").value.toLowerCase();
  const from = document.getElementById("fromDate").value; const to = document.getElementById("toDate").value;
  const s = document.getElementById("season").value; if(!s) return;
  db.ref("seasons/" + s + "/entries").once("value", eSnap => {
    let arr = Object.entries(eSnap.val() || {}).map(([id,v]) => ({ id, ...v }));
    if(name) arr = arr.filter(r => (r.customer || "").toLowerCase().includes(name));
    if(from) arr = arr.filter(r => r.date >= from);
    if(to) arr = arr.filter(r => r.date <= to);
    if(sortMode === "oldest") arr.sort((a,b) => a.date.localeCompare(b.date) || (a.timestamp - b.timestamp));
    else arr.sort((a,b) => b.date.localeCompare(a.date) || (b.timestamp - a.timestamp));
    updateTable(arr);
  });
}

function loadSuggestions(){
  const s = document.getElementById("season").value; if(!s) return;
  db.ref("seasons/" + s + "/entries").once("value", snap => {
    const data = Object.values(snap.val() || {});
    ["customer","father","village"].forEach(f=>{
        const vals = [...new Set(data.map(d => d[f]).filter(Boolean))];
        document.getElementById(f+"List").innerHTML = vals.map(n=>`<option value="${n}">`).join("");
    });
  });
}

function deleteEntry(id){ const s = document.getElementById("season").value; if(s && confirm("Delete?")){ db.ref("seasons/"+s+"/entries/"+id).remove().then(loadSeason); } }
function loadSeason(){ const s = document.getElementById("season").value; if(!s) return; db.ref("seasonsInfo/" + s).once("value", snap => { currentDefaultBW = Number(snap.val()?.defaultBw || 0); filterData(); }); }
function closeSeasonScreen(){ document.getElementById("seasonScreen").style.display = "none"; }
function addNoteToSuggestion(){ const noteInput = document.getElementById("note"); const list = document.getElementById("noteList"); const val = noteInput.value.trim(); if(!val) return; const exists = Array.from(list.options).some(o => o.value === val); if(!exists){ const opt = document.createElement("option"); opt.value = val; list.appendChild(opt); } }
function singleClickPrint(id){ clearTimeout(clickTimer); clickTimer = setTimeout(() => { openSingleEntryPreview(id); clickTimer = null; }, 300); }
function doubleClickEdit(id){ clearTimeout(clickTimer); clickTimer = null; editEntry(id); }
function openSingleEntryPreview(id){
  const s = document.getElementById("season").value; if(!s) return;
  db.ref("seasons/"+s+"/entries/"+id).once("value", snap => {
    const r = snap.val(); if(!r) return;
    let content = `<h2 style="text-align:center;">${s}</h2><table border="1" style="width:100%;border-collapse:collapse;"><tr><th>Date</th><td>${r.date || ""}</td></tr><tr><th>Customer</th><td><b>${r.customer || ""}</b></td></tr><tr><th>Bore</th><td>${r.bore || 0}</td></tr><tr><th>Net</th><td><b>₹${r.amount || 0}</b></td></tr></table>`;
    document.getElementById("previewContent").innerHTML = content;
    document.getElementById("printPreviewModal").style.display = "flex";
    applyZoom();
  });
}
</script> 
</body>
